databases:
  - name: auracash-db
    databaseName: auracash
    user: auracash
    plan: free

services:
  - type: web
    name: auracash-backend
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: auracash-db
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false   # preencher com o domínio do Render após o primeiro deploy
      - key: FRONTEND_URL
        sync: false   # preencher com a URL do Vercel após deploy do frontend
      - key: REDIS_URL
        sync: false   # preencher se usar Redis/Celery (opcional no plano free)
