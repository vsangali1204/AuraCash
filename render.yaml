# Banco de dados externo (uhserver.com) — não é provisionado pelo Render.
# A variável DATABASE_URL é preenchida manualmente nas env vars do serviço.

services:
  - type: web
    name: auracash-backend
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false   # preencher com a URL do banco externo (ver DEPLOY.txt)
      - key: ALLOWED_HOSTS
        sync: false   # preencher com o domínio do Render após o primeiro deploy
      - key: FRONTEND_URL
        sync: false   # preencher com a URL do Vercel após deploy do frontend
      - key: REDIS_URL
        sync: false   # opcional — deixar vazio se não usar Celery
